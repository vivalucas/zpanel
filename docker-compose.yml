services:
  zpanel:
    image: 'ghcr.io/vivalucas/zpanel:latest'
    container_name: zpanel
    volumes:
      - ./conf:/app/conf
      - ./uploads:/app/uploads
      - ./database:/app/database
    # - ./runtime:/app/runtime
    ports:
      - 3002:3002
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3002/api/healthz']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
