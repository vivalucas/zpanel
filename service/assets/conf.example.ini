# ======================
# Basic configuration
# ======================
[base]
# Web run port. Default:6521
http_port=6521
# Database driver [mysql/sqlite(Default)]
database_drive=sqlite
# Cache driver [redis/memory(Default)]
cache_drive=memory
# Queue driver [redis/memory(Default)]
queue_drive=memory

# ======================
# Runtime storage
# ======================
[storage]
# All mutable runtime data. Mount this directory when running with Docker.
data_path=./data
# Uploaded user, public, and system resources.
uploads_path=./data/uploads
# Temporary files for upload/import/export.
temp_path=./data/runtime/temp
# Regenerable cache files.
cache_path=./data/runtime/cache
# Runtime logs.
logs_path=./data/runtime/logs
# Manual and scheduled backups.
backups_path=./data/backups

# ======================
# Mysql database driver
# ======================
[mysql]
host=127.0.0.1
port=3306
username=root
password=root
db_name=zpanel
wait_timeout=100

# ======================
# sqlite database driver
# ======================
[sqlite]
file_path=./data/database/zpanel.db

# ======================
# redis database driver
# ======================
[redis]
address=127.0.0.1:6379
password=
prefix=zpanel:
db=0
